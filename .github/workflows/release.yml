name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
      
    - name: Get version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Run tests
      run: swift test --parallel
      
    - name: Build release binary
      run: swift build -c release
      
    - name: Create archive
      run: |
        cd .build/release
        tar -czf Differ-${{ steps.get_version.outputs.version }}-macos.tar.gz Differ
        
    - name: Generate checksums
      run: |
        cd .build/release
        shasum -a 256 Differ-${{ steps.get_version.outputs.version }}-macos.tar.gz > checksums.txt
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          .build/release/Differ-${{ steps.get_version.outputs.version }}-macos.tar.gz
          .build/release/checksums.txt
        body: |
          ## Differ v${{ steps.get_version.outputs.version }}
          
          ### Installation
          ```bash
          curl -L https://github.com/dehcast/Differ/releases/download/v${{ steps.get_version.outputs.version }}/Differ-${{ steps.get_version.outputs.version }}-macos.tar.gz | tar xz
          ```
          
          ### Checksums
          See `checksums.txt` for SHA256 checksums.
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
