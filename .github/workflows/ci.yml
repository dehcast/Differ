name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: macos-14
    strategy:
      matrix:
        swift: ["5.9"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Show Swift version
      run: swift --version
      
    - name: Resolve dependencies
      run: swift package resolve
      
    - name: Run DifferCore tests
      run: |
        cd Modules/DifferCore
        swift test --parallel
        
    # DifferUI tests temporarily disabled - require macOS GUI and have import issues
    # - name: Run DifferUI tests
    #   run: |
    #     cd Modules/DifferUI
    #     swift test --parallel
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          .build/debug/*.xctest
          Modules/**/Tests/__Snapshots__/
        retention-days: 7

  build:
    name: Build
    runs-on: macos-14
    strategy:
      matrix:
        configuration: [debug, release]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Show Swift version
      run: swift --version
      
    - name: Resolve dependencies
      run: swift package resolve
      
    - name: Build in ${{ matrix.configuration }} mode
      run: |
        if [ "${{ matrix.configuration }}" = "release" ]; then
          swift build -c release
        else
          swift build
        fi
        
    - name: Upload build artifacts
      if: matrix.configuration == 'release'
      uses: actions/upload-artifact@v4
      with:
        name: differ-release
        path: .build/release/Differ
        retention-days: 30

  lint:
    name: SwiftLint
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install SwiftLint
      run: brew install swiftlint
      
    - name: Run SwiftLint
      run: swiftlint lint --strict

  check-compilation:
    name: Check Module Compilation
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Check DifferCore compiles
      run: |
        cd Modules/DifferCore
        swift build
        
    - name: Check DifferKit compiles
      run: |
        cd Modules/DifferKit
        swift build
        
    - name: Check DifferServices compiles
      run: |
        cd Modules/DifferServices
        swift build
        
    - name: Check DifferUI compiles
      run: |
        cd Modules/DifferUI
        swift build

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test, build, check-compilation]
    if: always()
    
    steps:
    - name: Check status
      run: |
        if [ "${{ needs.test.result }}" != "success" ] || \
           [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.check-compilation.result }}" != "success" ]; then
          echo "CI failed"
          exit 1
        fi
        echo "CI passed"
