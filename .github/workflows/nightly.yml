name: Nightly Build

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  nightly-test:
    name: Nightly Tests
    runs-on: blacksmith-6vcpu-macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Show Swift version
      run: swift --version
      
    - name: Resolve dependencies
      run: swift package resolve
      
    - name: Run all tests
      run: swift test --parallel
      
    - name: Generate test report
      if: always()
      run: |
        echo "## Nightly Test Results" > test-report.md
        echo "Date: $(date)" >> test-report.md
        echo "Commit: ${{ github.sha }}" >> test-report.md
        
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nightly-test-report-${{ github.run_number }}
        path: test-report.md
        retention-days: 30

  nightly-build:
    name: Nightly Release Build
    runs-on: blacksmith-6vcpu-macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Build release
      run: swift build -c release --verbose
      
    - name: Create archive
      run: |
        cd .build/release
        tar -czf Differ-nightly.tar.gz Differ
        
    - name: Upload nightly build
      uses: actions/upload-artifact@v4
      with:
        name: differ-nightly-${{ github.run_number }}
        path: .build/release/Differ-nightly.tar.gz
        retention-days: 7

  notify:
    name: Notify on Failure
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [nightly-test, nightly-build]
    if: failure()
    
    steps:
    - name: Create issue on failure
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Nightly build failed on ${new Date().toISOString().split('T')[0]}`,
            body: `The nightly build or tests failed.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            labels: ['ci', 'nightly-failure']
          })
